{% extends 'exams/base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h2>{{ action }} Subject</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="card-static p-4 mt-3">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label-custom">Subject Name</label>
                <input type="text" name="name" class="form-control form-control-custom"
                       value="{{ subject.name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label-custom">Subject Code</label>
                <input type="text" name="code" class="form-control form-control-custom"
                       value="{{ subject.code|default:'' }}" required>
            </div>
            <button type="submit" class="btn btn-primary-custom">{{ action }}</button>
            <a href="{% url 'subject_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
